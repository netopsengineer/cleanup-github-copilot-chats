---
name: Pre-commit autoupdate

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install prek
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          mode: install

      - name: Run prek autoupdate
        run: prek auto-update

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet .pre-commit-config.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run prek with updated hooks
        if: steps.diff.outputs.changed == 'true'
        run: prek run --all-files --show-diff-on-failure || true

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/pre-commit-autoupdate
          title: "chore(deps): pre-commit autoupdate"
          body: |
            Automated pre-commit hook version updates via `prek auto-update`.

            The full hook suite ran against these changes during this workflow.
            Review the workflow log for any failures before merging.
          commit-message: "chore(deps): pre-commit autoupdate"
          labels: dependencies
